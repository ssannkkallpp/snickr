{% extends "base.html" %}

{% block title %}Sign up — snickr{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-4 offset-md-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Create your account</h4>
        <form method="post" action="{{ url_for('auth.signup') }}">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   autofocus required>
          </div>
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
            <div class="form-text">Unique. This is how others find you.</div>
          </div>
          <div class="mb-3">
            <label for="nickname" class="form-label">
              Nickname <span class="text-muted">(optional)</span>
            </label>
            <input type="text" class="form-control" id="nickname" name="nickname">
            <div class="form-text">Display name. Doesn't have to be unique.</div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Create account</button>
          </div>
        </form>
        <hr>
        <p class="text-center mb-0">
          Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
