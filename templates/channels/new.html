{% extends "base_sidebar.html" %}

{% block title %}New Channel — {{ workspace.name }} — snickr{% endblock %}

{% block page_content %}
<div class="row">
  <div class="col-md-6 offset-md-3">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <a href="{{ url_for('workspaces.workspace_detail', ws_id=workspace.workspace_id) }}"
           class="text-muted text-decoration-none small">← {{ workspace.name }}</a>
        <h4 class="card-title mt-2 mb-4">New Channel</h4>
        <form method="post"
              action="{{ url_for('channels.new_channel', ws_id=workspace.workspace_id) }}">
          <div class="mb-3">
            <label for="name" class="form-label">Channel name</label>
            <input type="text" class="form-control" id="name" name="name"
                   required autofocus>
            <div class="form-text">Lowercase, no spaces recommended</div>
          </div>
          <div class="mb-4">
            <label class="form-label d-block">Channel type</label>
            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" name="channel_type"
                     id="type-public" value="public" checked>
              <label class="form-check-label fw-semibold" for="type-public">Public</label>
              <div class="form-text ms-4">Anyone in the workspace can join</div>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="channel_type"
                     id="type-private" value="private">
              <label class="form-check-label fw-semibold" for="type-private">Private</label>
              <div class="form-text ms-4">By invitation only</div>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create Channel</button>
            <a href="{{ url_for('workspaces.workspace_detail', ws_id=workspace.workspace_id) }}"
               class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
