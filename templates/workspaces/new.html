{% extends "base.html" %}

{% block title %}Create a Workspace — snickr{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-6 offset-md-3">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Create a Workspace</h4>
        <form method="post" action="{{ url_for('workspaces.new_workspace') }}">
          <div class="mb-3">
            <label for="name" class="form-label">Workspace name</label>
            <input type="text" class="form-control" id="name" name="name"
                   required autofocus>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">
              Description <span class="text-muted">(optional)</span>
            </label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create Workspace</button>
            <a href="{{ url_for('workspaces.list_workspaces') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
